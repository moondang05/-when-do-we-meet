<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레트로 달력 UI</title>
    <!-- 외부 CSS 연결 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar-wrapper">
    
    <!-- 달력 헤더 (타이포그래피 강조) -->
    <div class="cal-header">
        <div class="cal-month">MAY</div>
        <div class="cal-year-info">
            <div class="cal-month-num">05</div>
            <div class="cal-year">2026</div>
        </div>
    </div>

    <!-- 달력 본문 (그리드) -->
    <div class="cal-grid">
        <!-- 요일 -->
        <div class="cal-cell weekday">Mo</div>
        <div class="cal-cell weekday">Tu</div>
        <div class="cal-cell weekday">We</div>
        <div class="cal-cell weekday">Th</div>
        <div class="cal-cell weekday">Fr</div>
        <div class="cal-cell weekday">Sa</div>
        <div class="cal-cell weekday">Su</div>

        <!-- 1주차 -->
        <div class="cal-cell dimmed">27</div>
        <div class="cal-cell dimmed">28</div>
        <div class="cal-cell dimmed">29</div>
        <div class="cal-cell dimmed">30</div>
        <div class="cal-cell">1</div>
        <div class="cal-cell">2</div>
        <div class="cal-cell">3</div>

        <!-- 2주차 -->
        <div class="cal-cell">4</div>
        <div class="cal-cell">5</div>
        <div class="cal-cell">6</div>
        <div class="cal-cell">7</div>
        <div class="cal-cell selected">8</div> <!-- 빨간색 포인트 선택됨 -->
        <div class="cal-cell">9</div>
        <div class="cal-cell">10</div>

        <!-- 3주차 -->
        <div class="cal-cell">11</div>
        <div class="cal-cell">12</div>
        <div class="cal-cell">13</div>
        <div class="cal-cell">14</div>
        <div class="cal-cell">15</div>
        <div class="cal-cell">16</div>
        <div class="cal-cell">17</div>

        <!-- 4주차 -->
        <div class="cal-cell">18</div>
        <div class="cal-cell">19</div>
        <div class="cal-cell">20</div>
        <div class="cal-cell">21</div>
        <div class="cal-cell">22</div>
        <div class="cal-cell">23</div>
        <div class="cal-cell">24</div>

        <!-- 5주차 -->
        <div class="cal-cell selected">25</div> <!-- 빨간색 포인트 선택됨 -->
        <div class="cal-cell">26</div>
        <div class="cal-cell">27</div>
        <div class="cal-cell">28</div>
        <div class="cal-cell">29</div>
        <div class="cal-cell">30</div>
        <div class="cal-cell dimmed">1</div>
    </div>
</div>

<!-- 외부 JS 연결 -->
<script src="script.js"></script>

</body>
</html>
