<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레트로 달력 UI</title>
    <style>
        /* 기본 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 전체 배경 (빈티지한 크림색) */
        body {
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif; /* 깔끔한 산세리프 폰트 */
        }

        /* 달력 컨테이너 */
        .calendar-wrapper {
            background-color: #F5F1E7; /* 포스터 종이 느낌의 배경색 */
            width: 100%;
            max-width: 400px; /* 모바일 사이즈 기준 */
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 상단 헤더 영역 (큰 타이포그래피) */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            color: #1A2B4C; /* 딥 네이비 */
        }

        .cal-month {
            font-size: 5rem;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .cal-year-info {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .cal-month-num {
            border: 1px solid #1A2B4C;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .cal-year {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
        }

        /* 달력 그리드 영역 */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            /* 선 굵은 그리드를 만들기 위한 꼼수: 컨테이너 배경을 선 색으로 지정하고 gap을 1px 줌 */
            background-color: #1A2B4C;
            gap: 1px; 
            border: 1px solid #1A2B4C;
        }

        /* 요일 및 날짜 공통 셀 스타일 */
        .cal-cell {
            background-color: #F5F1E7; /* 셀 배경을 다시 크림색으로 */
            aspect-ratio: 1; /* 정사각형 유지 */
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 6px;
            font-size: 1rem;
            font-weight: 700;
            color: #1A2B4C;
            position: relative;
        }

        /* 요일 헤더 부분 */
        .weekday {
            aspect-ratio: auto; /* 요일은 정사각형 아님 */
            height: 30px;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* 이전/다음 달의 희미한 날짜 */
        .dimmed {
            color: #b5b1a5;
        }

        /* 선택된 날짜 (포인트 컬러 - 쨍한 레드) */
        .selected {
            background-color: #E74C3C;
            color: white;
            border-radius: 40px; /* 알약 모양처럼 둥글게 */
            z-index: 1; /* 테두리 위로 올라오게 */
            /* 1px 갭 때문에 둥근 모서리가 잘리는 걸 방지하기 위해 스케일 살짝 키움 */
            transform: scale(1.02); 
            cursor: pointer;
        }

        /* 오늘 날짜 표시 (선택적) */
        .today::after {
            content: '';
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 6px;
            height: 6px;
            background-color: #1A2B4C;
            border-radius: 50%;
        }

    </style>
</head>
<body>

<div class="calendar-wrapper">
    
    <div class="cal-header">
        <div class="cal-month">MAY</div>
        <div class="cal-year-info">
            <div class="cal-month-num">05</div>
            <div class="cal-year">2026</div>
        </div>
    </div>

    <div class="cal-grid">
        <div class="cal-cell weekday">Mo</div>
        <div class="cal-cell weekday">Tu</div>
        <div class="cal-cell weekday">We</div>
        <div class="cal-cell weekday">Th</div>
        <div class="cal-cell weekday">Fr</div>
        <div class="cal-cell weekday">Sa</div>
        <div class="cal-cell weekday">Su</div>

        <div class="cal-cell dimmed">27</div>
        <div class="cal-cell dimmed">28</div>
        <div class="cal-cell dimmed">29</div>
        <div class="cal-cell dimmed">30</div>
        <div class="cal-cell">1</div>
        <div class="cal-cell">2</div>
        <div class="cal-cell">3</div>

        <div class="cal-cell">4</div>
        <div class="cal-cell">5</div>
        <div class="cal-cell">6</div>
        <div class="cal-cell">7</div>
        <div class="cal-cell selected">8</div> <div class="cal-cell">9</div>
        <div class="cal-cell">10</div>

        <div class="cal-cell">11</div>
        <div class="cal-cell">12</div>
        <div class="cal-cell">13</div>
        <div class="cal-cell">14</div>
        <div class="cal-cell">15</div>
        <div class="cal-cell">16</div>
        <div class="cal-cell">17</div>

        <div class="cal-cell">18</div>
        <div class="cal-cell">19</div>
        <div class="cal-cell">20</div>
        <div class="cal-cell">21</div>
        <div class="cal-cell">22</div>
        <div class="cal-cell">23</div>
        <div class="cal-cell">24</div>

        <div class="cal-cell selected">25</div> <div class="cal-cell">26</div>
        <div class="cal-cell">27</div>
        <div class="cal-cell">28</div>
        <div class="cal-cell">29</div>
        <div class="cal-cell">30</div>
        <div class="cal-cell dimmed">1</div>
    </div>
</div>

</body>
</html>
