<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레트로 포스터 달력</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase 구버전 호환 라이브러리 추가 -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

<body>

    <div class="calendar-wrapper">
        <!-- 달력 헤더 -->
        <div class="cal-header">
            <div class="cal-month" id="month-display"></div>
            <div class="cal-year-info">
                <div class="cal-month-num" id="month-num-display"></div>
                <div class="cal-year" id="year-display"></div>
            </div>
        </div>

        <!-- 달력 본문 (그리드) -->
        <div class="cal-grid" id="calendar-grid">
            <!-- JS로 요일과 날짜가 채워집니다 -->
        </div>

        <!-- 하단 달 넘기기 버튼 (말랑 폰트 각괄호) -->
        <div class="cal-controls">
            <button id="prev-btn" class="arrow-btn">&lt;</button>
            <button id="next-btn" class="arrow-btn">&gt;</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
